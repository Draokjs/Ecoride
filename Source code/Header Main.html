<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecoride</title>
  <link rel="stylesheet" href="Style/Boostrap.css">
  <link rel="stylesheet" href="Style/Headermain.css">
  <link rel="stylesheet" href="Style/Style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <div class="container header">
    <div class="row d-flex align-items-center">
      <div class="col-sm-2 col-md-2 col-lg-2">
        <img src="Image/Logo.jpeg" alt="Logo" style="max-height: 200px;">
      </div>
      <div class="col-sm-2 col-md-2 col-lg-2 text-center" id="accueil" style="font-size: 1.3rem; ">
        <a href="Header Main.html" target="_blank" style="text-decoration: none; color: black;">Accueil</a>
      </div>
      <div class="col-sm-2 col-md-2 col-lg-2 text-center" id="trajets" style="font-size: 1.3rem;">
        <a href="Vos trajets.html" target="_blank" style="text-decoration: none; color: black;">Vos trajets</a>
      </div>
      <div class="col-sm-2 col-md-2 col-lg-2 text-center" id="espace" style="font-size: 1.3rem;">
        <a href="Mon espace.html" target="_blank" style="text-decoration: none; color: black;">Mon espace</a>
      </div>
      <div class="col-sm-2 col-md-2 col-lg-2 text-center" id="Contacs" style="font-size: 1.3rem;">
        <a href="Contacts.html" target="_blank" style="text-decoration: none; color: black;">Contacts</a>
      </div>
      <div class=" col-sm-2 col-md-2 col-lg-2 text-center login">
        <div class="dropdown">
          <button class="Loginbutton dropdown-toggle" type="button" id="dropdownMenuButton1" data-bs-toggle="dropdown" aria-expanded="false" style="border: none; background-color: transparent;">
            <span class="Seconnecter">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="var(--bs-main-color)" class="bi bi-person-circle" viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
              </svg>
            </span>
          </button>
          <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton1">
            <li><a class="dropdown-item" href="Login.html" style="--bs-dropdown-link-hover-bg: var(--bs-main-color);">Se connecter</a></li>
            <li><a class="dropdown-item" href="Register.html" style="--bs-dropdown-link-hover-bg: var(--bs-main-color);">S'inscrire</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <div class="container searchbar" style="width: fit-content; background-color: var(--bs-main-color); border-radius: 5%;" >
      <div class="row" style="margin-top: 3rem;">
        <div class="col-lg-12 col-md-12 col-sm-12">
          <p class="text-center" style="font-size: 1.5rem">
            Itinéraire
          </p>
      <!-- Ville de départ -->
      <div class="row">
        <div class="col-lg-5 col-md-5 col-sm-5">
          <div class="input-group">
            <input type="text" class="form-control" placeholder="Ville de départ" id="Ville de départ" style="font-size: 1.5rem;">
          </div>
        </div>
        
        <!-- Invert arrow -->
        <div class="col-lg-2 col-md-2 col-sm-2 d-flex justify-content-center align-items-center">
          <button class="btn btn-complementary-color" id="arrow" type="button" onclick="inverseArrow()">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" class="bi bi-arrow-down-up" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M11.5 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L11 2.707V14.5a.5.5 0 0 0 .5.5m-7-14a.5.5 0 0 1 .5.5v11.793l3.146-3.147a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 .708-.708L4 13.293V1.5a.5.5 0 0 1 .5-.5"/>
            </svg>
          </button>
        </div>

        <!-- Ville d'arrivée -->
        <div class="col-lg-5 col-md-5 col-sm-5">
          <div class="input-group">
            <input type="text" class="form-control" placeholder="Ville d'arrivée" id="Ville d'arrivée" style="font-size: 1.5rem;">
          </div>
        </div>
      </div>
      
      <!-- Date -->
      <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12 mt-3"> 
          <p class="text-center" style="font-size: 1.5rem">
            Dates départ / Dates d'arrivée
          </p>
          <div class="input-group">
            <input type="date" class="form-control" placeholder="Date" id="Date" style="font-size: 1.5rem;">  
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12"> 
          <div class="input-group">
            <input type="date" class="form-control" placeholder="Date" id="DateArrivee" style="font-size: 1.5rem;">
          </div>
        </div>
      </div>
      <!-- Passagers -->
      <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12 mt-3">
          <p class="text-center" style="font-size: 1.5rem">
            Passagers
          </p>
          <input type="number" class="form-control" placeholder="Nombre de personnes" id="Nombre de personnes" style="font-size: 1.5rem;">
        </div>
      </div>
      <!-- Rechercher button -->
      <div class="col-lg-12 col-md-12 col-sm-12 mt-4">
        <div class="row mx-5">
          <button type="submit" class="btn btn-complementary-color"> Rechercher </button>
        </div>
      </div>
        </div>
    </div>
  </div>

  <script src="Index.js"></script>
</body>
</html>
